<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 – הדף לא נמצא | טלגראס כיוונים</title>
  <meta name="robots" content="noindex, follow">
  <link rel="canonical" href="https://telegrass-israel.xyz/">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css">
  <style>
    :root { --blue: #185a9d; --teal: #43cea2; --grad: linear-gradient(135deg, #43cea2, #185a9d); }
    body { font-family: system-ui, -apple-system, sans-serif; background: #f0f4f8; color: #1a2533; direction: rtl; min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 2rem; }
    .box { background: #fff; border-radius: 1.25rem; padding: 3rem 2rem; max-width: 480px; box-shadow: 0 4px 20px rgba(24,90,157,.13); }
    .num { font-size: 5rem; font-weight: 900; background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1; }
    h1 { font-size: 1.4rem; font-weight: 800; color: var(--blue); margin: 1rem 0 .5rem; }
    p { color: #5a6a7e; margin-bottom: 1.5rem; }
    .btn-home { background: var(--grad); color: #fff; border: none; border-radius: 2rem; font-weight: 700; padding: .75em 2em; font-size: 1rem; text-decoration: none; display: inline-block; }
    .btn-home:hover { opacity: .9; color: #fff; }
  </style>
  <!-- Redirect after 5s -->
  <meta http-equiv="refresh" content="5;url=/">
</head>
<body>
  <div class="box">
    <div class="num">404</div>
    <h1>הדף לא נמצא</h1>
    <p>הדף שחיפשתם אינו קיים או הועבר.<br>תועברו לדף הבית תוך 5 שניות.</p>
    <a href="/" class="btn-home">חזרה לדף הבית</a>
  </div>
</body>
</html>
